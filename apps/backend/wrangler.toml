name = "pw-cong-api"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pw-cong"
database_id = "YOUR_D1_DATABASE_ID"  # wrangler d1 create pw-cong で取得

[vars]
FRONTEND_URL = "https://YOUR_PAGES_DOMAIN.pages.dev"
# JWT_SECRET は wrangler secret put JWT_SECRET で設定（ダッシュボードでも可）
