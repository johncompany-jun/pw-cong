services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      FRONTEND_URL: http://localhost:5173
    volumes:
      # Hot reload: mount source files
      - ./apps/backend/src:/app/apps/backend/src
      # Persist SQLite DB
      - backend_db:/app/apps/backend

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:3000
    volumes:
      # Hot reload: mount source files
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/.env:/app/apps/frontend/.env:ro
    depends_on:
      - backend

volumes:
  backend_db:
